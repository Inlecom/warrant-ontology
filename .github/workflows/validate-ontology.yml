name: Validate WARRaNT Ontology

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Turtle Syntax Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rdflib
        run: pip install rdflib

      - name: Validate Turtle syntax and namespace usage
        run: python scripts/validate_turtle.py

      - name: Build merged ontology (CI artefact check)
        run: python scripts/merge_ontology.py
